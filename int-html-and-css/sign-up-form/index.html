<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Form</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div id="container">
        <div id="left-side">
            <div id="logo">
                <img src="./odin-lined.png">
                <h2>ODIN</h2>
            </div>
        </div>
        <div id="right-side">
            <div id="top">
                <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams.
                    <br> Sign up <em>now</em> to get started.</p>
                <p>You know you want to.</p>
            </div>
            <div id="form-div">
                <p>Let's do this!</p>
                <form id="user-registration-form">
                    <fieldset id="user-registration-fieldset">
                        <div class="form-input">
                            <label for="first-name">First Name</label>
                            <input type="text" id="first-name" name="first-name" required>
                        </div>
                        <div class="form-input">
                            <label for="last-name">Last Name</label>
                            <input type="text" id="last-name" name="last-name" required>
                        </div>
                        <div class="form-input">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" placeholder="a@b" required>
                        </div>
                        <div class="form-input">
                            <label for="phone-number">Phone Number</label>
                            <input type="tel" id="phone-number" pattern="^\+[0-9] \([0-9]{3}\) [0-9]{3}-[0-9]{4}$" name="phone-number" placeholder="+_ (___) ___-____" autocomplete="off" required>
                        </div>
                        <div class="form-input">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" required>
                        </div>
                        <div class="form-input">
                            <label for="confirm-password">Confirm Password</label>
                            <input type="password" id="confirm-password" name="confirm-password"  required>
                        </div>
                    </fieldset>
                </form>
            </div>
            <div id="bottom">
                <button id="submit" form="user-registration-form" type="submit">Create Account</button>
                <p>Already have an account? <a href="../">Log in</a></p>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="add-note-modal" class="modal-overlay">
        <div class="modal-box">
            <button id="closeModalBtn" class="modal-close">×</button>
            <h3>Add To-Do</h3>
            <div class="grid-row">
                <label for="title">Title:</label>
                <input id="title" type="text" placeholder="Title"/>
            </div>
            <div class="grid-row">
                <label for="description">Description:</label>
                <textarea id="description" placeholder="Task Description"></textarea>
            </div>
            <div class="grid-row">
                <label for="title">Title:</label>
                <input id="date" type="date" value="1994-05-04"/>
            </div>
            <div class="grid-row">
                <label for="priority">Title:</label>
                <select id="priority" type="text" placeholder="Title">
                    <option value="High">High</option>
                    <option value="Medium">Medium</option>
                    <option value="Low">Low</option>
                </select>
            </div>
            <button id="submit-note">Submit</button>
        </div>
    </div>
    <div id="container">
        <div id="sidebar">
            <div class="row">
                <h1>Todo List</h1>
                <button id="add-note">+</button>
            </div>
            
            <div>
                <ul>
                    <li id="inbox">Inbox</li>
                    <li>Today</li>
                    <li>Tomorrow</li>
                    <li>This Week</li>
                    <li>This Month</li>
                    <li>Completed</li>
                </ul>
            </div>
            <div class="row">
                <h2>Projects</h2>
                <button id="add-project">+</button>
                
            </div>
            <ul>
                <li>test</li>
            </ul>
        </div>
        <div id="content">

        </div>
    </div>
</body>
</html>

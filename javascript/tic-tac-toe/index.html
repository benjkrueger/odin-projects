<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Tic-Tac-Toe</h1>
    <div class="row">
        <div id="div_player1">
            <h2>Player 1 (X)</h2>
        </div>
        <div id="div_player2">
            <h2>Player 2 (O)</h2>
        </div>
    </div>
    <div class="row">
        <button id="play_game">Play Game</button>
    </div>
    <h2 id="message"> </h2>
    <div class="board" id="board">
        
    </div>
</body>
</html>

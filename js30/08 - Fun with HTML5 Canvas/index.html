<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HTML5 Canvas</title>
  <link rel="icon" href="https://fav.farm/🔥" />
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div id="toolbar">
    <button id="magicColor" class="magic-button" aria-pressed="false">Magic Color</button>
    <button id="magicWidth" class="magic-button" aria-pressed="false">Magic Width</button>
    <div>
      <fieldset>
        <label id="brushSizeLabel" for="brushSize">Brush Size: 50</label>
        <input id="brushSize" type="range" min="1" max="100" value="50">
      </fieldset>
      <fieldset>
        <label id="opacityLabel" for="brushSize">Opacity: 1</label>
        <input id="opacity" type="range" min="0.1" max="1" value="1" step="0.1">
      </fieldset>
    </div>
    
    
    <button id="backgroundFill">Background Fill</button>
    <div id="currentColor">Current Color</div>
    <canvas id="colorCanvas" class="color-canvas"></canvas>
  </div>
  <canvas id="draw" width="800" height="800"></canvas>



</body>
</html>

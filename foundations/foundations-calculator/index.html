<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="calculator">
        <div class="row">
            <label class="op"  for="op">Operator:</label>
            <label class="holder" for="holder">Result:</label>
            <label class="input" for="input">Current:</label>
        </div>
        <div class="row">
            <input type="text" class="op" id="op" readonly>
            <input type="text" class="holder" id="holder" readonly>
            <input type="text" class="input" id="input" readonly>
        </div>
        
    </div>
    
    
</body>
</html>
